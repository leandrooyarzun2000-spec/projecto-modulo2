<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/estilosendmoney.css">
    <title>Enviar Dinero</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="/img/AlkeWallet.png" alt="LogoAlkeWallet">
        </div>
        <h1>Alke Wallet</h1>
    </header>
    <nav>
        <ul>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="sendmoney.html">Transferencias</a></li>
            <li><a href="transactions.html">Movimientos</a></li>
            <li><a href="deposit.html">Depositar</a></li>
        </ul>
    </nav>
    <main>
        <div class="container">
            <h2>Transación</h2>
            <div id="formulario">
                <form id="transferencia">
                    <div>
                        <label for="destinatario">Destinatario:</label>
                        <input type="text" id="destinatario">
                    </div>

                    <div>
                        <label for="montoenvio">Monto:</label>
                        <input type="number" id="montoenvio">
                    </div>

                    <div>
                        <button type="submit" class="btn btn-primary">Enviar Dinero</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="modal" id="errortransferencia" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Error!</h5>
                        <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <p>El saldo es insuficiente para la operacion asignada.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <section>
            <p>©2026 Alke Wallet. Todos los derechos reservados.</p>
        </section>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/sendmoney.js"></script>
</body>


</html>
