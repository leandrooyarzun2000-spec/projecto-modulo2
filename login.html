<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/estilologin.css">
    <title>Login</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="/img/AlkeWallet.png" alt="LogoAlkeWallet">
        </div>
        <h1>Alke Wallet</h1>
    </header>
    <main>
        <div class="container" id="acceso">
            <div id="atras">
                <p><a href="index.html">&larr; Atras </a></p>
            </div>
            <div>
            <h2>Inicio de Sesion</h2>
            </div>
            <form id="formulario">
                <div>
                    <label for="email">Correo Electronico:</label>
                    <input type="email" name="email" id="inputuno" placeholder="Email">
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" name="password" id="inputdos" placeholder="Contraseña">
                </div>
                <div>
                    <button type="submit" class="btn btn-primary" id="btnAceptar">Aceptar</button>
                </div>
            </form>
        </div>

        <div id="mensajeerror" class="error"></div>

    </main>
    <script src="/js/login.js"></script>
</body>
<footer>
    <section>
        <p>©2026 Alke Wallet. Todos los derechos reservados.</p>
    </section>
</footer>

</html>
